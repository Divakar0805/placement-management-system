<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Profile</title>
    <link rel="stylesheet" href="css/update-profile.css">
</head>
<body>
<div class="update-container">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h1>Update Profile</h1>
    <div class="form-box">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter Full Name">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter Email">
        <label for="degree">Degree</label>
        <input type="text" id="degree" placeholder="Enter Degree">
        <label for="department">Department</label>
        <input type="text" id="department" placeholder="Enter Department">
        <label for="college">College</label>
        <input type="text" id="college" placeholder="Enter College">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="Enter Phone Number">
        <label for="skills">Skills</label>
        <input type="text" id="skills" placeholder="Enter Skills">
        <label for="cgpa">CGPA</label>
        <input type="text" id="cgpa" placeholder="Enter CGPA">
        <label for="year">Year Of Passed Out</label>
        <input type="text" id="year" placeholder="Enter Passed Out Year">
        <label for="gender">Gender</label>
        <input type="text" id="gender" placeholder="Enter Gender">
        <label for="dob">Date Of Birth</label>
        <input type="date" id="dob">
        <label for="address">Address</label>
        <textarea id="address" placeholder="Enter Address"></textarea>
        <button onclick="updateProfile()">Update Profile</button>
    </div>
</div>
<script>
    let email = localStorage.getItem("studentEmail");
    fetch("http://localhost:8081/students/email/" + email)
        .then(response => response.json())
        .then(student => {
            localStorage.setItem("studentId", student.id);
            document.getElementById("name").value = student.name;
            document.getElementById("email").value = student.email;
            document.getElementById("degree").value = student.degree;
            document.getElementById("department").value = student.department;
            document.getElementById("college").value = student.college;
            document.getElementById("phone").value = student.phoneNumber;
            document.getElementById("skills").value = student.skills;
            document.getElementById("cgpa").value = student.cgpa;
            document.getElementById("year").value = student.year_Of_PassedOut;
            document.getElementById("gender").value = student.gender;
            document.getElementById("dob").value = student.dateOfBirth;
            document.getElementById("address").value = student.address;
        });
    function updateProfile() {
        let studentId = localStorage.getItem("studentId");
        fetch("http://localhost:8081/students/update/" + studentId,
            {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: document.getElementById("name").value,
                    email: document.getElementById("email").value,
                    degree: document.getElementById("degree").value,
                    department: document.getElementById("department").value,
                    college: document.getElementById("college").value,
                    phoneNumber: document.getElementById("phone").value,
                    skills: document.getElementById("skills").value,
                    cgpa: document.getElementById("cgpa").value,
                    year_Of_PassedOut: document.getElementById("year").value,
                    gender: document.getElementById("gender").value,
                    dateOfBirth: document.getElementById("dob").value,
                    address: document.getElementById("address").value
                })
            })
            .then(response => response.json())
            .then(data => {
                alert("Profile Updated Successfully");
                localStorage.setItem(
                    "studentEmail",
                    document.getElementById("email").value
                );
                window.location.href = "student-dashboard.html";
            });
    }
    function goBack() {
        window.history.back();
    }
</script>

</body>
</html>
